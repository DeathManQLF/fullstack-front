<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizza Full Stack Release</title>
    <link rel="stylesheet" href="css/estilos.css">
    <script src="jquery/jquery-3.6.0.min.js"></script>
</head>

<body>

    <form id="formularioPizza" action="http://localhost:5000/pizza" method="post" >
        <div id="titulo__imagen">
            <img src="images/logo.png" alt="Logotipo">
            <h1>Pizzas Full Stack</h1>
        </div>

        <h2>Datos del Cliente</h2>

        <div id="fondo__cliente">
            <div class="form__cliente">
                <label id="nRojo" for="nombre">Nombre:</label>
                <input type="text" name="nombre" id="nombre">
            </div>

            <div class="form__cliente">
                <label  id="aRojo" for="apellido">Apellidos:</label>
                <input type="text" name="apellido" id="apellido">
            </div>

            <div class="form__cliente">
                <label for="nacimiento">Fecha de Nacimiento:</label>
                <input type="date" name="nacimiento" id="nacimiento">
            </div>

            <div class="form__cliente">
                <label for="telefono">Numero de telefono:</label>
                <input type="tel" name="telefono" id="telefono">
            </div>

            <div class="form__cliente">
                <label for="postal">Codigo Postal:</label>
                <textarea name="postal" id="postal" cols="15" rows="5"></textarea>
            </div>
        </div>
        <h2>Datos del Pedido</h2>

        <div id="fondo__pedido">
            <select>
                <option id="Seleccionar" selected>Seleccionar</option>
                <option id="Pequeña">Pequeña</option>
                <option id="Mediana">Mediana</option>
                <option id="Grande">Grande</option>
            </select>

            <label for="ing1">Jamon York</label>
            <input type="checkbox" id="ing1" name="ing1" />
            <label for="ing2">Champiñones</label>
            <input type="checkbox" id="ing2" name="ing2" />
            <label for="ing3">Pepperoni</label>
            <input type="checkbox" id="ing3" name="ing3" />
            <label for="ing4">Aceitunas</label>
            <input type="checkbox" id="ing4" name="ing4" />
        </div>

        <button type="submit">Enviar</button>

    </form>



    <script src="js/formulario_jquery.js"></script>
</body>
</html>
